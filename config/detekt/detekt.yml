build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  active: true
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
  LongParameterList:
    active: true
    threshold: 6
  LongMethod:
    active: true
    threshold: 80
  LargeClass:
    active: true
    threshold: 300

naming:
  active: true
  FunctionNaming:
    active: true
    # Allow PascalCase for Compose @Composable functions
    functionPattern: '^[a-z|A-Z][a-zA-Z0-9]*$'
  ClassNaming:
    active: true
    classPattern: '^[A-Z][a-zA-Z0-9]*$'

potential-bugs:
  active: true
  UnusedPrivateMember:
    active: true

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '100'
